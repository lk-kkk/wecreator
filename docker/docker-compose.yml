version: '3.8'

services:
  # MySQL 8.0 主数据库
  mysql:
    image: mysql:8.0
    container_name: wecreator-mysql
    environment:
      MYSQL_ROOT_PASSWORD: wecreator@2026
      MYSQL_DATABASE: wecreator_dev
      MYSQL_USER: wcadmin
      MYSQL_PASSWORD: wecreator@2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
               --character-set-server=utf8mb4
               --collation-server=utf8mb4_unicode_ci

  # Redis 7.x 缓存+分布式锁
  redis:
    image: redis:7-alpine
    container_name: wecreator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass wecreator@2026

  # MongoDB 消息存储
  mongodb:
    image: mongo:6.0
    container_name: wecreator-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: wcadmin
      MONGO_INITDB_ROOT_PASSWORD: wecreator@2026
      MONGO_INITDB_DATABASE: wecreator_msg
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Adminer 数据库可视化管理界面（开发用）
  adminer:
    image: adminer
    container_name: wecreator-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
  redis_data:
  mongodb_data:
