# ============================================================
# WeCreator — Nginx 反向代理配置（生产环境）
# 企业后台: admin.wecreator.cn
# 运营后台: ops.wecreator.cn
# API 网关: api.wecreator.cn
# ============================================================

upstream backend {
    server backend:3000;
    keepalive 32;
}

# ── HTTP → HTTPS 重定向 ──────────────────────
server {
    listen 80;
    server_name admin.wecreator.cn ops.wecreator.cn api.wecreator.cn;
    return 301 https://$host$request_uri;
}

# ── 企业 PC 后台 ─────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.wecreator.cn;

    ssl_certificate     /etc/nginx/ssl/admin.wecreator.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.wecreator.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html/pc-admin;
    index index.html;

    # 静态资源 — 长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # WebSocket 代理 (IM 聊天)
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Vue Router History Mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}

# ── 平台运营后台 ──────────────────────────────
server {
    listen 443 ssl http2;
    server_name ops.wecreator.cn;

    ssl_certificate     /etc/nginx/ssl/ops.wecreator.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/ops.wecreator.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html/platform-admin;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}

# ── API 网关（小程序 / 第三方调用）────────────
server {
    listen 443 ssl http2;
    server_name api.wecreator.cn;

    ssl_certificate     /etc/nginx/ssl/api.wecreator.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/api.wecreator.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 请求体限制（文件上传）
    client_max_body_size 50m;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # 限速（防刷）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req zone=api_limit burst=50 nodelay;
}
